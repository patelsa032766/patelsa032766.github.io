<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KanjiAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon.png">

<style>

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(180deg,#f7f7f7,#ececec);
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 640px;
  text-align: center;
  padding: 20px;
}

.app-icon {
  width: 96px;
  height: 96px;
  margin-bottom: 20px;
  border-radius: 22px;
}

h1 {
  font-size: 48px;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.tagline {
  font-size: 20px;
  color: #666;
  margin-bottom: 40px;
}

.button {
  display: inline-block;
  padding: 14px 32px;
  background: #000;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: 500;
  font-size: 16px;
  transition: all .2s ease;
}

.button:hover {
  opacity: .85;
  transform: translateY(-1px);
}

.appstore-note {
  margin-top: 20px;
  font-size: 14px;
  color: #666;
}

.footer {
  margin-top: 70px;
  font-size: 14px;
  color: #666;
}

.footer a {
  color: #666;
  text-decoration: none;
  margin: 0 8px;
}

.footer a:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">

<img src="/icon.png" class="app-icon">

<h1>KanjiAI</h1>

<p class="tagline">Learn Kanji the Smart Way</p>

<a class="button" href="/app">Open the App</a>

<p class="appstore-note">
Coming soon to the App Store
</p>

<div class="footer">
<a href="/privacy.html">Privacy Policy</a> ·
<a href="/terms.html">Terms</a> ·
<a href="/support.html">Support</a>
</div>

</div>

</body>
</html>
